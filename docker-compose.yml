# YouGile MCP server — remote HTTP + Google OAuth deployment.
#
# Caddy terminates TLS and obtains a publicly-trusted Let's Encrypt certificate
# automatically (a self-signed cert will NOT work with Claude). It reverse-proxies
# https://${MCP_DOMAIN} to the MCP app, which itself speaks plain HTTP internally.
#
# Required in .env:  YOUGILE_API_KEY, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
#                    MCP_DOMAIN, ACME_EMAIL, and at least one of
#                    GOOGLE_ALLOWED_EMAILS / GOOGLE_ALLOWED_DOMAIN.
# (MCP_PUBLIC_URL is derived from MCP_DOMAIN below.)

services:
  yougile-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MCP_PORT: "3000"
      MCP_PUBLIC_URL: "https://${MCP_DOMAIN}"
      YOUGILE_API_KEY: "${YOUGILE_API_KEY}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      # Access control is required: set at least one of the two below, otherwise the
      # server refuses to start (it would let any verified Google account sign in).
      GOOGLE_ALLOWED_DOMAIN: "${GOOGLE_ALLOWED_DOMAIN:-}"
      GOOGLE_ALLOWED_EMAILS: "${GOOGLE_ALLOWED_EMAILS:-}"
      # Optional YouGile overrides
      YOUGILE_API_HOST_URL: "${YOUGILE_API_HOST_URL:-}"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - yougile-mcp
    ports:
      - "80:80"
      - "443:443"
    environment:
      MCP_DOMAIN: "${MCP_DOMAIN}"
      ACME_EMAIL: "${ACME_EMAIL}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
